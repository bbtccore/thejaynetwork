name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  WASMVM_VERSION: "v3.0.3"

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download wasmvm libraries
        run: |
          go mod download github.com/CosmWasm/wasmvm/v3
          WASMVM_DIR=$(go env GOMODCACHE)/github.com/\!cosm\!wasm/wasmvm/v3@${WASMVM_VERSION}/internal/api
          echo "wasmvm dir: ${WASMVM_DIR}"
          ls -la ${WASMVM_DIR}/ || true
          curl -sL -o ${WASMVM_DIR}/libwasmvm.x86_64.so \
            https://github.com/CosmWasm/wasmvm/releases/download/${WASMVM_VERSION}/libwasmvm.x86_64.so
          ls -la ${WASMVM_DIR}/libwasmvm*

      - name: Build linux/amd64 (CGO + wasm)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse HEAD)
          LDFLAGS="-X github.com/cosmos/cosmos-sdk/version.Name=thejaynetwork \
                   -X github.com/cosmos/cosmos-sdk/version.AppName=jaynd \
                   -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION} \
                   -X github.com/cosmos/cosmos-sdk/version.Commit=${COMMIT}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags "${LDFLAGS}" -o build/jaynd-linux-amd64 ./cmd/jaynd
          ldd build/jaynd-linux-amd64 || true

      - name: Bundle shared library
        run: |
          WASMVM_DIR=$(go env GOMODCACHE)/github.com/\!cosm\!wasm/wasmvm/v3@${WASMVM_VERSION}/internal/api
          cp ${WASMVM_DIR}/libwasmvm.x86_64.so build/
          tar czf build/jaynd-linux-amd64.tar.gz -C build jaynd-linux-amd64 libwasmvm.x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaynd-linux-amd64
          path: build/jaynd-linux-amd64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download wasmvm libraries
        run: |
          go mod download github.com/CosmWasm/wasmvm/v3
          WASMVM_DIR=$(go env GOMODCACHE)/github.com/\!cosm\!wasm/wasmvm/v3@${WASMVM_VERSION}/internal/api
          echo "wasmvm dir: ${WASMVM_DIR}"
          ls -la ${WASMVM_DIR}/ || true
          curl -sL -o ${WASMVM_DIR}/libwasmvm.aarch64.so \
            https://github.com/CosmWasm/wasmvm/releases/download/${WASMVM_VERSION}/libwasmvm.aarch64.so
          ls -la ${WASMVM_DIR}/libwasmvm*

      - name: Build linux/arm64 (CGO + wasm)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse HEAD)
          LDFLAGS="-X github.com/cosmos/cosmos-sdk/version.Name=thejaynetwork \
                   -X github.com/cosmos/cosmos-sdk/version.AppName=jaynd \
                   -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION} \
                   -X github.com/cosmos/cosmos-sdk/version.Commit=${COMMIT}"
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ \
            go build -ldflags "${LDFLAGS}" -o build/jaynd-linux-arm64 ./cmd/jaynd

      - name: Bundle shared library
        run: |
          WASMVM_DIR=$(go env GOMODCACHE)/github.com/\!cosm\!wasm/wasmvm/v3@${WASMVM_VERSION}/internal/api
          cp ${WASMVM_DIR}/libwasmvm.aarch64.so build/
          tar czf build/jaynd-linux-arm64.tar.gz -C build jaynd-linux-arm64 libwasmvm.aarch64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaynd-linux-arm64
          path: build/jaynd-linux-arm64.tar.gz

  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: darwin-amd64
          - goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build darwin/${{ matrix.goarch }} (CGO + wasm)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse HEAD)
          LDFLAGS="-X github.com/cosmos/cosmos-sdk/version.Name=thejaynetwork \
                   -X github.com/cosmos/cosmos-sdk/version.AppName=jaynd \
                   -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION} \
                   -X github.com/cosmos/cosmos-sdk/version.Commit=${COMMIT}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.goarch }} \
            go build -ldflags "${LDFLAGS}" -o build/jaynd-${{ matrix.suffix }} ./cmd/jaynd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaynd-${{ matrix.suffix }}
          path: build/jaynd-${{ matrix.suffix }}

  release:
    needs: [build-linux-amd64, build-linux-arm64, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true

      - name: Create checksums
        run: cd build && sha256sum jaynd-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/jaynd-linux-amd64.tar.gz
            build/jaynd-linux-arm64.tar.gz
            build/jaynd-darwin-amd64
            build/jaynd-darwin-arm64
            build/checksums.txt
          generate_release_notes: true
