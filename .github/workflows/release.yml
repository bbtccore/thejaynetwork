name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse HEAD)
          LDFLAGS="-X github.com/cosmos/cosmos-sdk/version.Name=thejaynetwork \
                   -X github.com/cosmos/cosmos-sdk/version.AppName=jaynd \
                   -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION} \
                   -X github.com/cosmos/cosmos-sdk/version.Commit=${COMMIT}"

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o build/jaynd-linux-amd64 ./cmd/jaynd
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o build/jaynd-linux-arm64 ./cmd/jaynd
          # Darwin amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o build/jaynd-darwin-amd64 ./cmd/jaynd
          # Darwin arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o build/jaynd-darwin-arm64 ./cmd/jaynd

          # Create checksums
          cd build && sha256sum jaynd-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/jaynd-linux-amd64
            build/jaynd-linux-arm64
            build/jaynd-darwin-amd64
            build/jaynd-darwin-arm64
            build/checksums.txt
          generate_release_notes: true

